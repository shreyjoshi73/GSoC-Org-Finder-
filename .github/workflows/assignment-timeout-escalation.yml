name: Assignment Timeout Escalation

on:
  schedule:
    - cron: '0 * * * *'

  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: assignment-timeout-escalation
  cancel-in-progress: false

jobs:
  escalate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Escalate stale assignments
        uses: actions/github-script@v8
        env:
          PA_USERNAME: S3DFX-CYBER
          TIMEOUT_HOURS: 24
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner =
              context.repo.owner;

            const repo =
              context.repo.repo;

            const PA_USERNAME =
              process.env.PA_USERNAME;

            const TIMEOUT_HOURS =
              Number(process.env.TIMEOUT_HOURS || 24);

            const timeoutMs =
              TIMEOUT_HOURS * 60 * 60 * 1000;

            const marker =
              '<!-- assignment-status -->';

            core.info(
              'Fetching open issues...'
            );

            const issues =
              await github.paginate(
                github.rest.issues.listForRepo,
                {
                  owner,
                  repo,
                  state: 'open',
                  per_page: 100
                }
              );

            const filteredIssues =
              issues.filter(
                issue => !issue.pull_request
              );

            core.info(
              `Found ${filteredIssues.length} open issues`
            );

            for (const issue of filteredIssues) {

              try {

                if (
                  issue.assignees &&
                  issue.assignees.length > 0
                ) {

                  core.info(
                    `Issue #${issue.number} already assigned`
                  );

                  continue;

                }

                const comments =
                  await github.paginate(
                    github.rest.issues.listComments,
                    {
                      owner,
                      repo,
                      issue_number: issue.number,
                      per_page: 100
                    }
                  );

                const assignmentComment =
                  comments.find(
                    comment =>
                      comment.body &&
                      comment.body.includes(marker)
                  );

                if (!assignmentComment) {

                  continue;

                }

                const body =
                  assignmentComment.body || '';

                if (
                  body.includes(
                    '⚠️ Mentor Review Timeout'
                  )
                ) {

                  core.info(
                    `Issue #${issue.number} already escalated`
                  );

                  continue;

                }

                const createdAt =
                  new Date(
                    assignmentComment.created_at
                  ).getTime();

                const age =
                  Date.now() - createdAt;

                if (age < timeoutMs) {

                  core.info(
                    `Issue #${issue.number} still within timeout`
                  );

                  continue;

                }

                core.info(
                  `Escalating issue #${issue.number}`
                );

                const escalatedBody = [
                  marker,
                  '',
                  '# ⚠️ Mentor Review Timeout',
                  '',
                  'No mentor approved this assignment within 24 hours.',
                  '',
                  `Escalating to PA review: @${PA_USERNAME}`,
                  '',
                  '### PA Actions',
                  '',
                  '- review assignment eligibility',
                  '- manually assign contributor',
                  '- optionally rotate new mentors',
                  '',
                  '_This escalation was triggered automatically._'
                ].join('\n');

                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: assignmentComment.id,
                  body: escalatedBody
                });

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body:
                    `@${PA_USERNAME} this issue assignment request has timed out and requires PA review.`
                });

                core.info(
                  `Escalation completed for issue #${issue.number}`
                );

              } catch (error) {

                core.warning(
                  `Failed processing issue #${issue.number}: ${error.message}`
                );

              }

            }

            core.info(
              'Assignment timeout escalation completed'
            );
