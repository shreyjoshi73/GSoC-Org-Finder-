name: 📋 Issue Quality Validator

on:
  issues:
    types:
      - opened
      - edited

permissions:
  issues: write

concurrency:
  group: issue-quality-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Issue Quality

    if: |
      github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    steps:
      - name: Run Quality Checks
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const issue = context.payload.issue;

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issue_number = issue.number;
            const username = issue.user.login;

            // Ignore bots
            if (
              issue.user.type === 'Bot'
            ) {
              core.info('Skipping bot issue');
              return;
            }

            // Ignore PRs
            if (issue.pull_request) {
              core.info('Skipping PR');
              return;
            }

            // Ignore maintainers
            const association =
              issue.author_association || '';

            if (
              ['OWNER', 'MEMBER', 'COLLABORATOR']
                .includes(association)
            ) {
              core.info('Skipping maintainer issue');
              return;
            }

            const labels = (issue.labels || [])
              .map(l => l.name.toLowerCase());

            // Ignore exempt labels
            if (
              labels.includes('research') ||
              labels.includes('meta')
            ) {
              core.info('Skipping exempt issue');
              return;
            }

            const title =
              (issue.title || '').trim();

            const body =
              (issue.body || '').trim();

            const problems = [];

            //
            // --------------------------------------------------
            // TITLE VALIDATION
            // --------------------------------------------------
            //

            if (title.length < 10) {

              problems.push(
                '⚠️ Title is too short. Please use a descriptive summary.'
              );
            }

            const normalizedTitle =
              title
                .toLowerCase()
                .replace(/[^a-z0-9\s]/g, '')
                .trim();

            const GENERIC_TITLES = [
              'bug',
              'issue',
              'fix',
              'help',
              'error',
              'problem',
              'feature',
              'request'
            ];

            if (
              GENERIC_TITLES.includes(
                normalizedTitle
              )
            ) {

              problems.push(
                '⚠️ Title is too generic. Please be more specific.'
              );
            }

            //
            // --------------------------------------------------
            // BODY VALIDATION
            // --------------------------------------------------
            //

            // Minimum meaningful content
            const cleanedBody =
              body
                .replace(/<!--[\s\S]*?-->/g, '')
                .replace(/[#>*`\-\[\]]/g, '')
                .trim();

            if (cleanedBody.length < 50) {

              problems.push(
                '❌ Issue description is too short. Please provide more detail.'
              );
            }

            // Encourage structured issues
            const likelyTemplate =
              /reproduce|expected|actual|environment|steps/i
                .test(body);

            if (!likelyTemplate) {

              problems.push(
                '⚠️ Please provide reproduction steps, expected behavior, or additional context.'
              );
            }

            //
            // --------------------------------------------------
            // COMMENT + LABEL MANAGEMENT
            // --------------------------------------------------
            //

            const MARKER =
              '<!-- issue-quality-validator -->';

            const comments =
              await github.paginate(
                github.rest.issues.listComments,
                {
                  owner,
                  repo,
                  issue_number,
                  per_page: 50
                }
              );

            const existingComment =
              comments.find(c =>
                c.user.type === 'Bot' &&
                c.body.includes(MARKER)
              );

            //
            // PASSED VALIDATION
            //

            if (problems.length === 0) {

              // Remove sticky warning
              if (existingComment) {

                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: existingComment.id
                });

                core.info(
                  'Removed validation warning'
                );
              }

              // Remove label
              if (
                labels.includes('needs-quality')
              ) {

                try {

                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number,
                    name: 'needs-quality'
                  });

                } catch (e) {

                  core.info(
                    `Failed removing label: ${e.message}`
                  );
                }
              }

              core.info(
                `Issue #${issue_number} passed validation`
              );

              return;
            }

            //
            // FAILED VALIDATION
            //

            const bodyText =
              `${MARKER}\n` +
              `## 📋 Issue Quality Suggestions\n\n` +
              `Hi @${username}, please improve the following before maintainers review this issue:\n\n` +
              problems.map(p => `- ${p}`).join('\n') +
              `\n\n---\n` +
              `After editing the issue, this check will update automatically.`;

            // Update only if changed
            if (
              existingComment &&
              existingComment.body.trim() ===
                bodyText.trim()
            ) {

              core.info(
                'Validation comment already current'
              );

            } else if (existingComment) {

              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body: bodyText
              });

              core.info(
                'Updated validation comment'
              );

            } else {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: bodyText
              });

              core.info(
                'Created validation comment'
              );
            }

            // Add label if needed
            if (
              !labels.includes('needs-quality')
            ) {

              try {

                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: ['needs-quality']
                });

              } catch (e) {

                core.info(
                  `Failed adding label: ${e.message}`
                );
              }
            }