name: 💬 Unresolved Conversation Reminder

on:
  schedule:
    - cron: '0 */12 * * *'

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: unresolved-conversation-reminder
  cancel-in-progress: false

jobs:
  remind:
    runs-on: ubuntu-latest

    steps:
      - name: Check unresolved PR conversations
        uses: actions/github-script@v8

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // ----------------------------------------
            // CONFIG
            // ----------------------------------------

            const REMINDER_MARKER =
              '<!-- unresolved-conversations-reminder -->';

            const STALE_HOURS = 24;
            const REMINDER_COOLDOWN_DAYS = 5;

            const knownBots = [
              'github-actions',
              'dependabot',
              'copilot',
              'coderabbitai'
            ];

            // ----------------------------------------
            // LOAD MENTORS
            // ----------------------------------------

            let mentors = new Set();

            try {

              const mentorFile =
                await github.rest.repos.getContent({
                  owner,
                  repo,
                  path:
                    '.github/reviewers/gssoc-mentors.json'
                });

              const parsed = JSON.parse(
                Buffer.from(
                  mentorFile.data.content,
                  'base64'
                ).toString()
              );

              mentors = new Set(
                (parsed.reviewers || [])
                  .map(x => x.toLowerCase())
              );

            } catch (e) {

              core.warning(
                `Failed loading mentor list: ${e.message}`
              );
            }

            // ----------------------------------------
            // FETCH OPEN PRS
            // ----------------------------------------

            const prs = await github.paginate(
              github.rest.pulls.list,
              {
                owner,
                repo,
                state: 'open',
                per_page: 100
              }
            );

            core.info(
              `Found ${prs.length} open PRs`
            );

            const staleThreshold =
              new Date(
                Date.now() -
                STALE_HOURS * 60 * 60 * 1000
              );

            // ----------------------------------------
            // PROCESS EACH PR
            // ----------------------------------------

            for (const pr of prs) {

              const pull_number = pr.number;

              const author =
                pr.user?.login || '';

              const authorLower =
                author.toLowerCase();

              const updatedAt =
                new Date(pr.updated_at);

              core.info(
                `Checking PR #${pull_number}`
              );

              // ----------------------------------------
              // SKIP BOT PRS
              // ----------------------------------------

              const isBot =
                pr.user?.type === 'Bot' ||
                author.endsWith('[bot]') ||
                knownBots.includes(authorLower);

              if (isBot) {

                core.info(
                  'Skipping bot PR'
                );

                continue;
              }

              // ----------------------------------------
              // SKIP RECENTLY UPDATED
              // ----------------------------------------

              if (updatedAt > staleThreshold) {

                core.info(
                  'Skipping recently updated PR'
                );

                continue;
              }

              // ----------------------------------------
              // FETCH REVIEW THREADS
              // ----------------------------------------

              const query = `
                query(
                  $owner: String!,
                  $repo: String!,
                  $pull: Int!,
                  $after: String
                ) {
                  repository(
                    owner: $owner,
                    name: $repo
                  ) {
                    pullRequest(number: $pull) {
                      reviewThreads(
                        first: 100,
                        after: $after
                      ) {
                        nodes {
                          isResolved
                          isOutdated

                          comments(first: 20) {
                            nodes {
                              author {
                                login
                              }
                            }
                          }
                        }

                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                      }
                    }
                  }
                }
              `;

              let allThreads = [];

              let hasNextPage = true;
              let cursor = null;

              try {

                while (hasNextPage) {

                  const result =
                    await github.graphql(
                      query,
                      {
                        owner,
                        repo,
                        pull: pull_number,
                        after: cursor
                      }
                    );

                  const reviewThreads =
                    result.repository
                      .pullRequest
                      .reviewThreads;

                  allThreads.push(
                    ...reviewThreads.nodes
                  );

                  hasNextPage =
                    reviewThreads.pageInfo
                      .hasNextPage;

                  cursor =
                    reviewThreads.pageInfo
                      .endCursor;
                }

              } catch (e) {

                core.warning(
                  `Failed loading review threads for PR #${pull_number}: ${e.message}`
                );

                continue;
              }

              // ----------------------------------------
              // FILTER VALID UNRESOLVED THREADS
              // ----------------------------------------

              const unresolvedThreads =
                allThreads.filter(thread => {

                  if (
                    thread.isResolved ||
                    thread.isOutdated
                  ) {
                    return false;
                  }

                  // only count mentor discussions
                  const hasMentorComment =
                    thread.comments.nodes.some(
                      comment => {

                        const login =
                          comment.author?.login
                            ?.toLowerCase();

                        return (
                          login &&
                          mentors.has(login)
                        );
                      }
                    );

                  return hasMentorComment;
                });

              const unresolvedCount =
                unresolvedThreads.length;

              if (!unresolvedCount) {

                core.info(
                  'No unresolved mentor conversations'
                );

                continue;
              }

              core.info(
                `Found ${unresolvedCount} unresolved mentor conversations`
              );

              // ----------------------------------------
              // GET EXISTING COMMENTS
              // ----------------------------------------

              const comments =
                await github.paginate(
                  github.rest.issues.listComments,
                  {
                    owner,
                    repo,
                    issue_number: pull_number,
                    per_page: 100
                  }
                );

              const reminderComments =
                comments.filter(comment =>
                  comment.body?.includes(
                    REMINDER_MARKER
                  )
                );

              // ----------------------------------------
              // COOLDOWN PROTECTION
              // ----------------------------------------

              const cooldownDate =
                new Date(
                  Date.now() -
                  REMINDER_COOLDOWN_DAYS *
                  24 * 60 * 60 * 1000
                );

              const recentReminder =
                reminderComments.find(
                  comment =>
                    new Date(
                      comment.created_at
                    ) > cooldownDate
                );

              if (recentReminder) {

                core.info(
                  'Recent reminder already exists'
                );

                continue;
              }

              // ----------------------------------------
              // CLEAN OLD REMINDERS
              // ----------------------------------------

              for (const reminder of reminderComments) {

                try {

                  await github.rest.issues.deleteComment({
                    owner,
                    repo,
                    comment_id: reminder.id
                  });

                } catch (e) {

                  core.warning(
                    `Failed deleting old reminder: ${e.message}`
                  );
                }
              }

              // ----------------------------------------
              // LABEL MANAGEMENT
              // ----------------------------------------

              async function addLabel(name) {

                try {

                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: pull_number,
                    labels: [name]
                  });

                } catch {}
              }

              await addLabel(
                'unresolved-conversations'
              );

              await addLabel(
                'needs-author-response'
              );

              // ----------------------------------------
              // BUILD REMINDER
              // ----------------------------------------

              const conversationWord =
                unresolvedCount === 1
                  ? 'conversation'
                  : 'conversations';

              let body = '';

              body +=
                REMINDER_MARKER + '\n';

              body +=
                '## 💬 Unresolved Review Discussions\n\n';

              body +=
                `Hi @${author} 👋\n\n`;

              body +=
                `This PR currently has **${unresolvedCount} unresolved mentor ${conversationWord}**.\n\n`;

              body +=
                'Please address the pending feedback and resolve the review discussions so mentors can continue the review process.\n\n';

              body +=
                'PRs with unresolved review discussions may not progress through the review pipeline.\n\n';

              body +=
                'Thank you for keeping the review process smooth 🚀';

              // ----------------------------------------
              // CREATE REMINDER
              // ----------------------------------------

              try {

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pull_number,
                  body
                });

                core.info(
                  `Reminder posted for PR #${pull_number}`
                );

              } catch (e) {

                core.warning(
                  `Failed posting reminder for PR #${pull_number}: ${e.message}`
                );
              }
            }

            core.info(
              'Finished unresolved conversation scan'
            );
