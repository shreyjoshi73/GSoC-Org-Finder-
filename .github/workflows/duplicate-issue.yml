name: 🔁 Duplicate Issue Detector

on:
  issues:
    types:
      - opened

permissions:
  issues: write

concurrency:
  group: duplicate-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  detect-duplicate:
    name: Detect Duplicate Issues
    runs-on: ubuntu-latest

    if: |
      github.actor != 'github-actions[bot]'

    steps:
      - name: Analyze Issue
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issue_number = issue.number;
            const username = issue.user.login;

            // Ignore bots
            if (
              issue.user.type === 'Bot' ||
              username.endsWith('[bot]')
            ) {
              core.info('Skipping bot issue');
              return;
            }

            // Ignore PRs
            if (issue.pull_request) {
              core.info('Skipping pull request');
              return;
            }

            const labels = (issue.labels || [])
              .map(l => l.name.toLowerCase());

            // Ignore research/meta issues
            if (
              labels.includes('research') ||
              labels.includes('meta')
            ) {
              core.info('Skipping exempt issue');
              return;
            }

            const title = (issue.title || '').trim();

            // Ignore very short titles
            if (title.length < 10) {
              core.info('Title too short');
              return;
            }

            // Normalize helper
            const normalize = str =>
              str
                .toLowerCase()
                .replace(/[^a-z0-9\s]/g, '')
                .replace(/\s+/g, ' ')
                .trim();

            const currentTitle = normalize(title);

            // Fetch RECENT issues only
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner,
                repo,
                state: 'open',
                sort: 'created',
                direction: 'desc',
                per_page: 50
              }
            );

            let duplicate = null;

            for (const existing of issues) {

              if (
                existing.number === issue_number ||
                existing.pull_request
              ) {
                continue;
              }

              const existingLabels = (
                existing.labels || []
              ).map(l => l.name.toLowerCase());

              if (
                existingLabels.includes('research') ||
                existingLabels.includes('meta')
              ) {
                continue;
              }

              const existingTitle = normalize(
                existing.title || ''
              );

              // Exact match
              if (existingTitle === currentTitle) {
                duplicate = existing;
                break;
              }

              // Strong partial overlap
              if (
                existingTitle.includes(currentTitle) ||
                currentTitle.includes(existingTitle)
              ) {
                duplicate = existing;
                break;
              }
            }

            if (!duplicate) {
              core.info('No duplicate detected');
              return;
            }

            const MARKER =
              '<!-- duplicate-detector -->';

            const body =
              `${MARKER}\n` +
              `## 🔁 Possible Duplicate Issue\n\n` +
              `Hi @${username}, this issue appears similar to:\n\n` +
              `➡️ #${duplicate.number}\n\n` +
              `Please review the existing discussion before continuing.\n\n` +
              `If this issue is substantially different, feel free to clarify the distinction.`;

            // Existing sticky comment?
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number,
                per_page: 50
              }
            );

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes(MARKER)
            );

            // Update or create comment
            if (existingComment) {

              if (
                existingComment.body.trim() === body.trim()
              ) {
                core.info('Comment already current');
                return;
              }

              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body
              });

              core.info('Updated duplicate comment');

            } else {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });

              core.info('Created duplicate comment');
            }

            // Add label quietly
            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ['possible-duplicate']
              });

            } catch (e) {
              core.info(
                `Label may already exist: ${e.message}`
              );
            }