name: 🔁 Duplicate Issue Detector

on:
  issues:
    types:
      - opened

permissions:
  issues: write

concurrency:
  group: duplicate-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  detect-duplicate:
    name: Detect Duplicate Issues
    runs-on: ubuntu-latest

    if: |
      github.actor != 'github-actions[bot]'

    steps:
      - name: Analyze Issue
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issue_number = issue.number;
            const username = issue.user.login;

            // Ignore bots
            if (
              issue.user.type === 'Bot' ||
              username.endsWith('[bot]')
            ) {
              core.info('Skipping bot issue');
              return;
            }

            // Ignore PRs
            if (issue.pull_request) {
              core.info('Skipping pull request');
              return;
            }

            const labels = (issue.labels || [])
              .map(l => l.name.toLowerCase());

            // Ignore exempt labels
            if (
              labels.includes('research') ||
              labels.includes('meta')
            ) {
              core.info('Skipping exempt issue');
              return;
            }

            const title =
              (issue.title || '').trim();

            const body =
              (issue.body || '').trim();

            // Ignore weak issues
            if (title.length < 12) {
              core.info('Title too short');
              return;
            }

            const STOPWORDS = new Set([
              'the',
              'a',
              'an',
              'is',
              'are',
              'to',
              'of',
              'for',
              'on',
              'in',
              'and',
              'with',
              'issue',
              'bug',
              'problem',
              'error',
              'request',
              'feature',
              'add',
              'fix',
              'support',
              'broken',
              'not',
              'working'
            ]);

            function normalize(str) {
              return str
                .toLowerCase()
                .replace(/[^a-z0-9\s]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
            }

            function tokenize(str) {
              return normalize(str)
                .split(' ')
                .filter(Boolean)
                .filter(
                  word =>
                    !STOPWORDS.has(word)
                );
            }

            function similarity(a, b) {

              const setA =
                new Set(tokenize(a));

              const setB =
                new Set(tokenize(b));

              if (
                setA.size === 0 ||
                setB.size === 0
              ) {
                return 0;
              }

              const intersection =
                [...setA].filter(
                  x => setB.has(x)
                );

              const union =
                new Set([
                  ...setA,
                  ...setB
                ]);

              return (
                intersection.length /
                union.size
              );
            }

            function commonKeywordCount(a, b) {

              const setA =
                new Set(tokenize(a));

              const setB =
                new Set(tokenize(b));

              return [...setA]
                .filter(x => setB.has(x))
                .length;
            }

            // Fetch recent open issues
            const issues =
              await github.paginate(
                github.rest.issues.listForRepo,
                {
                  owner,
                  repo,
                  state: 'open',
                  sort: 'created',
                  direction: 'desc',
                  per_page: 100
                }
              );

            let duplicate = null;
            let bestScore = 0;

            for (const existing of issues) {

              if (
                existing.number === issue_number ||
                existing.pull_request
              ) {
                continue;
              }

              const existingLabels =
                (existing.labels || [])
                  .map(l =>
                    l.name.toLowerCase()
                  );

              if (
                existingLabels.includes('research') ||
                existingLabels.includes('meta')
              ) {
                continue;
              }

              const existingTitle =
                existing.title || '';

              const existingBody =
                existing.body || '';

              const titleScore =
                similarity(
                  title,
                  existingTitle
                );

              const bodyScore =
                similarity(
                  body,
                  existingBody
                );

              const keywordOverlap =
                commonKeywordCount(
                  title,
                  existingTitle
                );

              // Weighted score
              const finalScore =
                (titleScore * 0.7) +
                (bodyScore * 0.3);

              core.info(
                `Issue #${existing.number} score=${finalScore.toFixed(2)} overlap=${keywordOverlap}`
              );

              // Conservative thresholds
              if (
                finalScore >= 0.82 &&
                keywordOverlap >= 3
              ) {

                if (finalScore > bestScore) {

                  bestScore = finalScore;
                  duplicate = existing;

                }

              }

            }

            if (!duplicate) {
              core.info(
                'No duplicate detected'
              );
              return;
            }

            const MARKER =
              '<!-- duplicate-detector -->';

            const similarityPercent =
              Math.round(bestScore * 100);

            const bodyText = [
              MARKER,
              '',
              '## 🔁 Possible Duplicate Issue',
              '',
              `Hi @${username}, this issue appears similar to:`,
              '',
              `➡️ #${duplicate.number}`,
              '',
              `Similarity confidence: **${similarityPercent}%**`,
              '',
              'Please review the existing issue before continuing.',
              '',
              'If this issue is substantially different, you may clarify the distinction.',
              '',
              '_No automatic closure was performed._'
            ].join('\n');

            const comments =
              await github.paginate(
                github.rest.issues.listComments,
                {
                  owner,
                  repo,
                  issue_number,
                  per_page: 50
                }
              );

            const existingComment =
              comments.find(
                c =>
                  c.user.type === 'Bot' &&
                  c.body.includes(MARKER)
              );

            if (existingComment) {

              if (
                existingComment.body.trim() ===
                bodyText.trim()
              ) {

                core.info(
                  'Comment already exists'
                );

                return;

              }

              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id:
                  existingComment.id,
                body: bodyText
              });

              core.info(
                'Updated duplicate comment'
              );

            } else {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: bodyText
              });

              core.info(
                'Created duplicate comment'
              );

            }

            // Add soft label only
            try {

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ['possible-duplicate']
              });

            } catch (e) {

              core.info(
                `Label error: ${e.message}`
              );

            }
