name: Issue Context Assignment

on:
  issues:
    types:
      - opened
      - edited
      - reopened

  issue_comment:
    types:
      - created

permissions:
  issues: write
  pull-requests: read
  contents: read

concurrency:
  group: issue-assignment-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  assign:
    if: |
      github.event.issue.pull_request == null &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect commands
        id: cmd
        uses: actions/github-script@v8
        with:
          script: |
            const body =
              (
                context.payload.comment?.body ||
                ''
              ).trim();

            const assignMatch =
              /^\/assign$/i.test(body);

            const approveMatch =
              body.match(
                /^\/approve-assignment\s+@?([\w-]+)/i
              );

            core.setOutput(
              'is_assign',
              String(assignMatch)
            );

            core.setOutput(
              'is_approve',
              String(!!approveMatch)
            );

            core.setOutput(
              'target_user',
              approveMatch
                ? approveMatch[1].toLowerCase()
                : ''
            );

      # ─────────────────────────────────────────────
      # ACTIVE MENTOR CONTEXT REVIEW
      # ─────────────────────────────────────────────

      - name: Select rotating active mentors
        id: mentor_select
        if: |
          steps.cmd.outputs.is_assign != 'true' &&
          steps.cmd.outputs.is_approve != 'true'
        env:
          ISSUE_CLAIMANT: ${{ github.event.issue.user.login }}
          MAX_MENTORS: '2'
          RANDOM_ROTATION: 'true'
        run: |
          RESULT=$(node .github/scripts/select-issue-mentors.js)

          echo "result=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Post mentor review request
        if: |
          steps.cmd.outputs.is_assign != 'true' &&
          steps.cmd.outputs.is_approve != 'true'
        uses: actions/github-script@v8
        env:
          SELECTED_MENTORS_JSON: ${{ steps.mentor_select.outputs.result }}
        with:
          script: |
            const { owner, repo } =
              context.repo;

            const issue_number =
              context.issue.number;

            let selected = [];

            try {

              selected =
                JSON.parse(
                  process.env.SELECTED_MENTORS_JSON || '{}'
                ).selected || [];

            } catch {

              selected = [];

            }

            const marker =
              '<!-- mentor-context-review -->';

            const mentionList =
              selected.length
                ? selected
                    .map(m => `@${m}`)
                    .join(' • ')
                : '_No active mentors available._';

            const avatars =
              selected
                .map(
                  mentor =>
                    `<a href="https://github.com/${mentor}"><img src="https://github.com/${mentor}.png" width="52px" alt="${mentor}" /></a>`
                )
                .join('\n');

            const body = [
              marker,
              '',
              '# 👀 Active Mentor Review Requested',
              '',
              avatars,
              '',
              '### Selected Active Mentors',
              '',
              mentionList,
              '',
              '> Mentors are selected dynamically based on:',
              '> - recent activity',
              '> - review quality',
              '> - merged review history',
              '> - rotation fairness',
              '',
              '### Mentor Tasks',
              '',
              '- verify issue quality',
              '- check duplicates',
              '- validate scope',
              '- decide assignability',
              '',
              '_Mentor rotation updates automatically across issues._'
            ].join('\n');

            const comments =
              await github.paginate(
                github.rest.issues.listComments,
                {
                  owner,
                  repo,
                  issue_number,
                  per_page: 100
                }
              );

            const existing =
              comments.find(
                c =>
                  c.body &&
                  c.body.includes(marker)
              );

            if (existing) {

              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });

            } else {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });

            }

      # ─────────────────────────────────────────────
      # /assign FLOW
      # ─────────────────────────────────────────────

      - name: Validate issue assignment
        id: validate
        if: steps.cmd.outputs.is_assign == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } =
              context.repo;

            const issue_number =
              context.payload.issue.number;

            const claimant =
              context.payload.comment.user.login;

            const issue =
              (
                await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number
                })
              ).data;

            if (
              issue.state !== 'open' ||
              issue.locked
            ) {

              core.setOutput(
                'eligible',
                'false'
              );

              return;

            }

            if (
              (issue.assignees || []).length > 0
            ) {

              core.setOutput(
                'eligible',
                'false'
              );

              return;

            }

            core.setOutput(
              'eligible',
              'true'
            );

            core.setOutput(
              'claimant',
              claimant
            );

            core.setOutput(
              'issue_number',
              String(issue_number)
            );

      - name: Select rotating mentors
        id: assign_mentors
        if: |
          steps.cmd.outputs.is_assign == 'true' &&
          steps.validate.outputs.eligible == 'true'
        env:
          ISSUE_CLAIMANT: ${{ steps.validate.outputs.claimant }}
          MAX_MENTORS: '2'
          RANDOM_ROTATION: 'true'
        run: |
          RESULT=$(node .github/scripts/select-issue-mentors.js)

          echo "result=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Post assignment request
        if: |
          steps.cmd.outputs.is_assign == 'true' &&
          steps.validate.outputs.eligible == 'true'
        uses: actions/github-script@v8
        env:
          CLAIMANT: ${{ steps.validate.outputs.claimant }}
          SELECTED_MENTORS_JSON: ${{ steps.assign_mentors.outputs.result }}
        with:
          script: |
            const { owner, repo } =
              context.repo;

            const issue_number =
              context.issue.number;

            const claimant =
              process.env.CLAIMANT;

            let selected = [];

            try {

              selected =
                JSON.parse(
                  process.env.SELECTED_MENTORS_JSON || '{}'
                ).selected || [];

            } catch {

              selected = [];

            }

            const marker =
              '<!-- assignment-status -->';

            const mentions =
              selected
                .map(m => `@${m}`)
                .join(' • ');

            const avatars =
              selected
                .map(
                  mentor =>
                    `<a href="https://github.com/${mentor}"><img src="https://github.com/${mentor}.png" width="52px" alt="${mentor}" /></a>`
                )
                .join('\n');

            const body = [
              marker,
              '',
              '# ⏳ Assignment Pending Mentor Approval',
              '',
              avatars,
              '',
              `Requested by @${claimant}`,
              '',
              '### Active Mentors',
              '',
              mentions,
              '',
              '### Approve Using',
              '',
              '```',
              `/approve-assignment @${claimant}`,
              '```',
              '',
              '> Mentors rotate dynamically across issues.',
              '> If no response occurs within 24h, PA escalation may happen.'
            ].join('\n');

            const comments =
              await github.paginate(
                github.rest.issues.listComments,
                {
                  owner,
                  repo,
                  issue_number,
                  per_page: 100
                }
              );

            const existing =
              comments.find(
                c =>
                  c.body &&
                  c.body.includes(marker)
              );

            if (existing) {

              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });

            } else {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });

            }

      # ─────────────────────────────────────────────
      # APPROVAL FLOW
      # ─────────────────────────────────────────────

      - name: Process mentor approval
        if: steps.cmd.outputs.is_approve == 'true'
        uses: actions/github-script@v8
        env:
          TARGET_USER: ${{ steps.cmd.outputs.target_user }}
        with:
          script: |
            const { owner, repo } =
              context.repo;

            const issue_number =
              context.issue.number;

            const approver =
              context.payload.comment.user.login;

            const claimant =
              process.env.TARGET_USER;

            const comments =
              await github.paginate(
                github.rest.issues.listComments,
                {
                  owner,
                  repo,
                  issue_number,
                  per_page: 100
                }
              );

            const assignmentComment =
              comments.find(
                c =>
                  c.body &&
                  c.body.includes(
                    '<!-- assignment-status -->'
                  )
              );

            if (!assignmentComment) {

              core.info(
                'No assignment request found.'
              );

              return;

            }

            const body =
              assignmentComment.body || '';

            const mentorMentioned =
              body.includes(`@${approver}`);

            if (!mentorMentioned) {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `⛔ @${approver} is not one of the selected mentors for this issue.`
              });

              return;

            }

            const issue =
              (
                await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number
                })
              ).data;

            if (
              (issue.assignees || []).length > 0
            ) {

              core.info(
                'Issue already assigned.'
              );

              return;

            }

            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number,
              assignees: [claimant]
            });

            const updatedBody = [
              '<!-- assignment-status -->',
              '',
              '# ✅ Issue Assigned',
              '',
              `Assigned to @${claimant}`,
              '',
              `Approved by @${approver}`,
              '',
              '> Approved through active mentor review.'
            ].join('\n');

            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: assignmentComment.id,
              body: updatedBody
            });
